name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stockproject_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stockproject_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DB_SCHEMA_BOOTSTRAP_MODE: validate_only
      INIT_ADMIN_ENABLED: false
      POSTGRES_JDBC_URL: jdbc:postgresql://127.0.0.1:5432/stockproject_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_JDBC_URL: jdbc:redis://127.0.0.1:6379/0
      JWT_SECRET_KEY: ci-test-secret-key-please-change
      LLM_API_KEY: dummy-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run backend tests
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test -- --run

      - name: Build frontend
        run: npm run build
